<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowmind Test App - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 1.5rem;
            color: #333;
        }
        .logo span {
            font-size: 3rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        input.error {
            border-color: #ef4444;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .error-message.visible {
            display: block;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            background: #764ba2;
            transform: translateY(-1px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert.error.visible {
            display: block;
        }
        .hint {
            margin-top: 1.5rem;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
        }
        .hint strong {
            color: #333;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span>🔐</span>
            <h1>Sign In</h1>
        </div>
        
        <div id="alert" class="alert error">
            <span id="alert-message">Invalid credentials</span>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    autocomplete="email"
                    data-testid="email-input"
                >
                <div id="email-error" class="error-message">Please enter a valid email</div>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="555-123-4567"
                    autocomplete="tel"
                    data-testid="phone-input"
                >
                <div id="phone-error" class="error-message">Please enter a valid phone number (555-XXX-XXXX)</div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    data-testid="password-input"
                >
                <div id="password-error" class="error-message">Password is required</div>
            </div>
            
            <button type="submit" id="submit-btn" class="btn" disabled>
                Sign In
            </button>
        </form>
        
        <div class="hint">
            <strong>Demo Credentials:</strong><br>
            Email: test@flowmind.com<br>
            Phone: 555-123-4567<br>
            Password: password123
        </div>
        
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // Valid credentials (hardcoded)
        const VALID_CREDENTIALS = {
            email: 'test@flowmind.com',
            phone: '555-123-4567',
            password: 'password123'
        };

        // DOM Elements
        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const alertBox = document.getElementById('alert');
        const alertMessage = document.getElementById('alert-message');

        // Validation functions
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validatePhone(phone) {
            // Accept formats: 555-123-4567, 5551234567, (555) 123-4567
            const re = /^(\+?1[-.\s]?)?\(?[0-9]{3}\)?[-.\s]?[0-9]{3}[-.\s]?[0-9]{4}$/;
            return re.test(phone);
        }

        // Validate individual fields and show/hide errors
        function validateField(input, errorElement, validator) {
            const value = input.value.trim();
            const isValid = value && validator(value);
            
            if (value && !isValid) {
                input.classList.add('error');
                errorElement.classList.add('visible');
            } else {
                input.classList.remove('error');
                errorElement.classList.remove('visible');
            }
            
            return isValid || !value;
        }

        // Check if all fields are valid
        function checkFormValidity() {
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value.trim();

            const isEmailValid = email && validateEmail(email);
            const isPhoneValid = phone && validatePhone(phone);
            const isPasswordValid = password.length > 0;

            // Enable button only if all fields are filled AND valid
            submitBtn.disabled = !(isEmailValid && isPhoneValid && isPasswordValid);
        }

        // Event listeners for validation
        emailInput.addEventListener('input', () => {
            validateField(emailInput, document.getElementById('email-error'), validateEmail);
            checkFormValidity();
        });

        phoneInput.addEventListener('input', () => {
            validateField(phoneInput, document.getElementById('phone-error'), validatePhone);
            checkFormValidity();
        });

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value.trim();
            const errorEl = document.getElementById('password-error');
            
            if (password && password.length < 1) {
                passwordInput.classList.add('error');
                errorEl.classList.add('visible');
            } else {
                passwordInput.classList.remove('error');
                errorEl.classList.remove('visible');
            }
            checkFormValidity();
        });

        // Form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value.trim();

            // Check credentials
            if (
                email === VALID_CREDENTIALS.email &&
                phone === VALID_CREDENTIALS.phone &&
                password === VALID_CREDENTIALS.password
            ) {
                // Success - redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Failure - show error
                alertMessage.textContent = 'Invalid credentials. Please check your email, phone, and password.';
                alertBox.classList.add('visible');
                
                // Clear password on failure
                passwordInput.value = '';
                checkFormValidity();
            }
        });
    </script>
</body>
</html>

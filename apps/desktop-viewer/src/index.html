<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowmind Desktop Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #1e1e2e;
      --bg2: #2d2d44;
      --bg3: #3d3d5c;
      --text: #e4e4ef;
      --text2: #a0a0b8;
      --accent: #7c6ff7;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }
    
    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--bg2);
      border-right: 1px solid var(--bg3);
      display: flex;
      flex-direction: column;
    }
    
    .logo {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    
    .nav { padding: 10px; }
    
    .nav-item {
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    
    .nav-item:hover { background: var(--bg3); }
    .nav-item.active { background: var(--accent); color: white; }
    .nav-item .icon { font-size: 18px; }
    
    /* Main Content */
    .main {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .header h1 { font-size: 24px; }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    
    .btn-primary:hover { opacity: 0.9; }
    
    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--bg2);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
    }
    
    .stat-label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      margin-top: 5px;
    }
    
    /* Flow List */
    .flow-list {
      display: grid;
      gap: 15px;
    }
    
    .flow-card {
      background: var(--bg2);
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .flow-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    
    .flow-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .flow-meta {
      display: flex;
      gap: 20px;
      color: var(--text2);
      font-size: 13px;
    }
    
    .flow-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    /* Run List */
    .run-list {
      display: grid;
      gap: 10px;
    }
    
    .run-item {
      background: var(--bg2);
      padding: 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .run-item:hover { background: var(--bg3); }
    
    .run-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .run-status.passed { background: rgba(74, 222, 128, 0.2); color: var(--success); }
    .run-status.failed { background: rgba(248, 113, 113, 0.2); color: var(--error); }
    .run-status.running { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
    
    /* Detail View */
    .detail-view {
      background: var(--bg2);
      border-radius: 12px;
      padding: 20px;
    }
    
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--bg3);
    }
    
    .detail-header h2 { font-size: 20px; }
    
    /* Steps */
    .steps-list {
      display: grid;
      gap: 10px;
    }
    
    .step-item {
      background: var(--bg);
      padding: 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .step-number {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .step-icon.passed { color: var(--success); }
    .step-icon.failed { color: var(--error); }
    
    .step-info { flex: 1; }
    .step-name { font-weight: 500; }
    .step-action { color: var(--text2); font-size: 13px; }
    
    .step-duration {
      color: var(--text2);
      font-size: 13px;
    }
    
    /* Screenshot Gallery */
    .screenshot-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .screenshot-item {
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .screenshot-item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    
    .screenshot-label {
      padding: 10px;
      font-size: 13px;
      color: var(--text2);
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--text2);
    }
    
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    /* Hidden */
    .hidden { display: none !important; }
    
    /* Actions */
    .actions {
      display: flex;
      gap: 10px;
    }
    
    .back-btn {
      background: var(--bg3);
      border: none;
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .back-btn:hover { background: var(--bg); }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">🧠 Flowmind</div>
    <nav class="nav">
      <div class="nav-item active" data-view="dashboard">
        <span class="icon">📊</span> Dashboard
      </div>
      <div class="nav-item" data-view="flows">
        <span class="icon">🌊</span> Flows
      </div>
      <div class="nav-item" data-view="runs">
        <span class="icon">▶️</span> Runs
      </div>
      <div class="nav-item" data-view="status">
        <span class="icon">📈</span> Status
      </div>
    </nav>
    <div style="margin-top: auto; padding: 20px; border-top: 1px solid var(--bg3);">
      <div style="font-size: 12px; color: var(--text2);">Data Path</div>
      <div id="dataPath" style="font-size: 11px; word-break: break-all;"></div>
    </div>
  </div>
  
  <!-- Main Content -->
  <div class="main">
    <!-- Dashboard View -->
    <div id="dashboardView" class="view">
      <div class="header">
        <h1>Dashboard</h1>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div id="statFlows" class="stat-value">0</div>
          <div class="stat-label">Flows</div>
        </div>
        <div class="stat-card">
          <div id="statTotal" class="stat-value">0</div>
          <div class="stat-label">Total Runs</div>
        </div>
        <div class="stat-card">
          <div id="statPassed" class="stat-value" style="color: var(--success);">0</div>
          <div class="stat-label">Passed</div>
        </div>
        <div class="stat-card">
          <div id="statFailed" class="stat-value" style="color: var(--error);">0</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>
      
      <h2 style="margin-bottom: 15px;">Recent Runs</h2>
      <div id="recentRuns" class="run-list"></div>
    </div>
    
    <!-- Flows View -->
    <div id="flowsView" class="view hidden">
      <div class="header">
        <h1>Flows</h1>
      </div>
      <div id="flowList" class="flow-list"></div>
    </div>
    
    <!-- Runs View -->
    <div id="runsView" class="view hidden">
      <div class="header">
        <h1>Runs</h1>
      </div>
      <div id="runList" class="run-list"></div>
    </div>
    
    <!-- Status View -->
    <div id="statusView" class="view hidden">
      <div class="header">
        <h1>Status</h1>
      </div>
      <div class="detail-view">
        <h3 style="margin-bottom: 15px;">Statistics</h3>
        <div id="statusStats" class="stats-grid"></div>
        <h3 style="margin: 20px 0 15px;">Data Locations</h3>
        <div id="dataLocations"></div>
      </div>
    </div>
    
    <!-- Flow Detail View -->
    <div id="flowDetailView" class="view hidden">
      <div class="detail-view">
        <div class="detail-header">
          <div>
            <h2 id="flowDetailName"></h2>
            <p id="flowDetailDesc" style="color: var(--text2); margin-top: 5px;"></p>
          </div>
          <div class="actions">
            <button class="back-btn" onclick="showView('flows')">← Back</button>
            <button id="runFlowBtn" class="btn btn-primary">▶ Run Flow</button>
          </div>
        </div>
        <h3>Flow Graph</h3>
        <div id="flowGraph"></div>
      </div>
    </div>
    
    <!-- Run Detail View -->
    <div id="runDetailView" class="view hidden">
      <div class="detail-view">
        <div class="detail-header">
          <div>
            <h2>Run: <span id="runDetailId"></span></h2>
            <p style="color: var(--text2);">
              <span id="runDetailFlow"></span> • 
              <span id="runDetailDuration"></span>
            </p>
          </div>
          <button class="back-btn" onclick="showView('runs')">← Back</button>
        </div>
        <div id="runSteps" class="steps-list"></div>
        <h3 style="margin-top: 20px;">Screenshots</h3>
        <div id="runScreenshots" class="screenshot-gallery"></div>
      </div>
    </div>
  </div>
  
  <script>
    // Get API from main process
    const api = window.api;
    
    // Current state
    let currentView = 'dashboard';
    let currentFlow = null;
    let currentRun = null;
    
    // Show view
    function showView(view) {
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById(view + 'View').classList.remove('hidden');
      
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`[data-view="${view}"]`)?.classList.add('active');
      
      currentView = view;
      
      if (view === 'dashboard') loadDashboard();
      if (view === 'flows') loadFlows();
      if (view === 'runs') loadRuns();
      if (view === 'status') loadStatus();
    }
    
    // Load dashboard
    async function loadDashboard() {
      const stats = await api.getStats();
      document.getElementById('statFlows').textContent = stats.flowCount;
      document.getElementById('statTotal').textContent = stats.totalRuns;
      document.getElementById('statPassed').textContent = stats.passed;
      document.getElementById('statFailed').textContent = stats.failed;
      
      const runs = await api.getRuns(null, 10);
      const runsHtml = runs.length ? await Promise.all(runs.map(async r => {
        const flow = await api.getFlow(r.flowId);
        return `
          <div class="run-item" onclick="showRunDetail('${r.id}')">
            <div>
              <strong>${flow?.name || 'Unknown Flow'}</strong>
              <span style="color: var(--text2); margin-left: 10px;">${new Date(r.startedAt).toLocaleString()}</span>
            </div>
            <span class="run-status ${r.status}">${r.status}</span>
          </div>
        `;
      })) : '<div class="empty-state"><div class="icon">📋</div>No runs yet</div>';
      
      document.getElementById('recentRuns').innerHTML = runsHtml;
    }
    
    // Load flows
    async function loadFlows() {
      const flows = await api.getFlows();
      const flowsHtml = flows.length ? flows.map(f => `
        <div class="flow-card" onclick="showFlowDetail('${f.id}')">
          <div class="flow-name">${f.name}</div>
          <div class="flow-meta">
            <span>🔗 ${f.nodeCount} nodes</span>
            <span>📅 ${new Date(f.updatedAt).toLocaleDateString()}</span>
          </div>
        </div>
      `).join('') : '<div class="empty-state"><div class="icon">🌊</div>No flows yet<br><br>Create one with: node flowmind.js learn &lt;url&gt;</div>';
      
      document.getElementById('flowList').innerHTML = flowsHtml;
    }
    
    // Load runs
    async function loadRuns() {
      const runs = await api.getRuns(null, 50);
      const runsHtml = runs.length ? await Promise.all(runs.map(async r => {
        const flow = await api.getFlow(r.flowId);
        return `
          <div class="run-item" onclick="showRunDetail('${r.id}')">
            <div>
              <strong>${flow?.name || 'Unknown Flow'}</strong>
              <span style="color: var(--text2); margin-left: 10px;">${new Date(r.startedAt).toLocaleString()}</span>
            </div>
            <span class="run-status ${r.status}">${r.status}</span>
          </div>
        `;
      })) : '<div class="empty-state"><div class="icon">▶️</div>No runs yet</div>';
      
      document.getElementById('runList').innerHTML = runsHtml;
    }
    
    // Load status
    async function loadStatus() {
      const [stats, dataPath] = await Promise.all([
        api.getStats(),
        api.getDataPath()
      ]);
      
      document.getElementById('statusStats').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${stats.flowCount}</div>
          <div class="stat-label">Flows</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.totalRuns}</div>
          <div class="stat-label">Total Runs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: var(--success);">${stats.passed}</div>
          <div class="stat-label">Passed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color: var(--error);">${stats.failed}</div>
          <div class="stat-label">Failed</div>
        </div>
      `;
      
      document.getElementById('dataLocations').innerHTML = `
        <div style="background: var(--bg); padding: 15px; border-radius: 8px;">
          <div style="color: var(--text2); font-size: 12px; margin-bottom: 5px;">Database</div>
          <code>${dataPath}/data/flowmind.db</code>
        </div>
        <div style="background: var(--bg); padding: 15px; border-radius: 8px; margin-top: 10px;">
          <div style="color: var(--text2); font-size: 12px; margin-bottom: 5px;">Screenshots</div>
          <code>${dataPath}/screenshots/</code>
        </div>
      `;
    }
    
    // Show flow detail
    async function showFlowDetail(flowId) {
      currentFlow = await api.getFlow(flowId);
      if (!currentFlow) return;
      
      document.getElementById('flowDetailName').textContent = currentFlow.name;
      document.getElementById('flowDetailDesc').textContent = currentFlow.description || '';
      document.getElementById('runFlowBtn').onclick = () => runFlow(flowId);
      
      // Show graph
      const nodes = currentFlow.graph?.nodes || [];
      const graphHtml = nodes.map(n => `
        <div style="background: var(--bg); padding: 10px; border-radius: 6px; margin: 5px 0;">
          <strong>${n.label}</strong>
          ${n.action ? `<span style="color: var(--text2);"> — ${n.action}</span>` : ''}
          ${n.selector ? `<div style="font-size: 12px; color: var(--accent);">${n.selector}</div>` : ''}
        </div>
      `).join('<div style="text-align: center; color: var(--text2);">↓</div>');
      
      document.getElementById('flowGraph').innerHTML = graphHtml || '<div class="empty-state">No nodes</div>';
      
      showView('flowDetail');
    }
    
    // Show run detail
    async function showRunDetail(runId) {
      const [run, screenshots] = await Promise.all([
        api.getRun(runId),
        api.getScreenshots(runId)
      ]);
      if (!run) return;
      
      currentRun = run;
      
      const flow = await api.getFlow(run.flowId);
      document.getElementById('runDetailId').textContent = run.id.slice(0, 8);
      document.getElementById('runDetailFlow').textContent = flow?.name || 'Unknown Flow';
      document.getElementById('runDetailDuration').textContent = run.duration ? `${run.duration}ms` : '-';
      
      // Show steps
      const stepsHtml = (run.steps || []).map(s => `
        <div class="step-item">
          <div class="step-number">${s.stepNumber}</div>
          <span class="step-icon ${s.status}">${s.status === 'passed' ? '✓' : '✗'}</span>
          <div class="step-info">
            <div class="step-name">${s.name}</div>
            <div class="step-action">${s.action}${s.selector ? ` • ${s.selector}` : ''}</div>
          </div>
          <span class="step-duration">${s.duration ? `${s.duration}ms` : '-'}</span>
        </div>
      `).join('');
      
      document.getElementById('runSteps').innerHTML = stepsHtml || '<div class="empty-state">No steps</div>';
      
      // Show screenshots
      const screenshotsHtml = screenshots.map(s => `
        <div class="screenshot-item">
          <img src="file://${s}" alt="Screenshot" />
          <div class="screenshot-label">${s.split('/').pop()}</div>
        </div>
      `).join('');
      
      document.getElementById('runScreenshots').innerHTML = screenshotsHtml || '<div class="empty-state">No screenshots</div>';
      
      showView('runDetail');
    }
    
    // Run flow
    async function runFlow(flowId) {
      const btn = document.getElementById('runFlowBtn');
      btn.textContent = '⏳ Running...';
      btn.disabled = true;
      
      const result = await api.runFlow(flowId);
      
      btn.textContent = '▶ Run Flow';
      btn.disabled = false;
      
      if (result.success) {
        alert('Flow completed successfully!');
      } else {
        alert('Flow failed. Check console for details.');
      }
      
      loadDashboard();
    }
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.onclick = () => showView(item.dataset.view);
    });
    
    // Initialize
    document.getElementById('dataPath').textContent = api.getDataPath();
    loadDashboard();
  </script>
</body>
</html>

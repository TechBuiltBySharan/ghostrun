<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>FlowMind</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
    --sidebar-width: 220px;
    --titlebar: 36px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #titlebar { height: var(--titlebar); background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; -webkit-app-region: drag; flex-shrink: 0; gap: 12px; }
  #titlebar-logo { font-weight: 700; color: var(--accent); font-size: 14px; letter-spacing: -0.3px; -webkit-app-region: no-drag; }
  #titlebar-status { font-size: 12px; color: var(--text-dim); margin-left: auto; -webkit-app-region: no-drag; }

  #body { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: var(--sidebar-width); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  #content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── Sidebar ── */
  .nav-section { padding: 12px 8px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; border-radius: 6px; margin: 1px 4px; color: var(--text-dim); transition: all 0.1s; font-size: 13px; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(88,166,255,0.12); color: var(--accent); }
  .nav-item .nav-icon { width: 16px; text-align: center; font-size: 14px; flex-shrink: 0; }
  .nav-item .nav-badge { margin-left: auto; background: var(--bg3); border-radius: 999px; padding: 1px 7px; font-size: 10px; color: var(--text-dim); }
  .nav-separator { height: 1px; background: var(--border); margin: 8px 12px; }
  .nav-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
  .ai-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .ai-dot.online { background: var(--green); }

  /* ── Views ── */
  .view { flex: 1; overflow-y: auto; padding: 24px; display: none; }
  .view.active { display: block; }

  /* ── Dashboard ── */
  .view-title { font-size: 18px; font-weight: 600; color: var(--text-bright); margin-bottom: 20px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--text-bright); line-height: 1; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .recent-title { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 12px; }
  .run-list-mini { display: flex; flex-direction: column; gap: 4px; }
  .run-mini { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color 0.1s; }
  .run-mini:hover { border-color: var(--accent); }
  .run-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .run-mini-name { font-weight: 500; color: var(--text); flex: 1; }
  .run-mini-dur { font-size: 12px; color: var(--text-dim); }
  .run-mini-time { font-size: 11px; color: var(--text-dim); }

  /* ── Flows table ── */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .toolbar-title { font-size: 16px; font-weight: 600; color: var(--text-bright); flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text); transition: all 0.1s; }
  .btn:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { background: #79c0ff; border-color: #79c0ff; color: #000; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,0.5); }
  tr:hover td { background: rgba(33,38,45,0.5); }
  .flow-name { font-weight: 500; color: var(--text-bright); }
  .flow-url { font-size: 12px; color: var(--text-dim); }
  .flow-date { font-size: 12px; color: var(--text-dim); }
  .actions { display: flex; gap: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state .empty-msg { font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .empty-state .empty-sub { font-size: 13px; }
  .cmd { font-family: monospace; background: var(--bg3); padding: 2px 6px; border-radius: 4px; color: var(--accent); }

  /* ── Runs ── */
  .runs-layout { display: flex; gap: 0; height: 100%; overflow: hidden; }
  .runs-sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
  .runs-detail { flex: 1; overflow-y: auto; padding: 20px; }
  .run-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .run-item:hover { background: var(--bg3); }
  .run-item.selected { background: rgba(88,166,255,0.08); border-left: 2px solid var(--accent); }
  .run-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .run-name { font-weight: 500; color: var(--text-bright); flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-id { font-size: 11px; color: var(--text-dim); font-family: monospace; }
  .run-meta { display: flex; gap: 8px; font-size: 11px; color: var(--text-dim); }
  .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-fail { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-run  { background: rgba(88,166,255,0.15); color: var(--accent); }

  /* ── Run detail ── */
  .detail-header { margin-bottom: 20px; }
  .detail-flow-name { font-size: 18px; font-weight: 600; color: var(--text-bright); margin-bottom: 4px; }
  .detail-meta { display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--text-dim); }
  .steps-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
  .step-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color 0.1s; }
  .step-row:hover { border-color: var(--accent); }
  .step-row.selected-step { border-color: var(--accent); background: rgba(88,166,255,0.06); }
  .step-num { width: 20px; text-align: right; font-size: 11px; color: var(--text-dim); font-family: monospace; flex-shrink: 0; }
  .step-icon { font-size: 13px; flex-shrink: 0; }
  .step-name { flex: 1; color: var(--text); font-size: 13px; }
  .step-dur { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
  .step-err { font-size: 11px; color: var(--red); margin-top: 2px; padding-left: 30px; }
  .screenshot-pane { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .screenshot-pane img { width: 100%; height: auto; display: block; }
  .screenshot-empty { padding: 40px; text-align: center; color: var(--text-dim); }
  .failure-report { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .failure-report-title { font-weight: 700; color: var(--red); margin-bottom: 12px; font-size: 13px; letter-spacing: 0.3px; }
  .failure-section { margin-bottom: 10px; }
  .failure-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; }
  .failure-section-body { font-size: 13px; color: var(--text); line-height: 1.6; }

  /* ── Live run output ── */
  .run-output-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .run-output-box { width: 700px; max-height: 80vh; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
  .run-output-header { padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .run-output-title { font-weight: 600; color: var(--text-bright); }
  .run-output-close { cursor: pointer; color: var(--text-dim); font-size: 18px; line-height: 1; }
  .run-output-close:hover { color: var(--text); }
  .run-output-body { flex: 1; overflow-y: auto; padding: 16px 20px; font-family: monospace; font-size: 12px; color: var(--text); white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  .run-output-footer { padding: 12px 20px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }

  /* Loading */
  .loading { color: var(--text-dim); font-size: 13px; padding: 20px; }
</style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <span id="titlebar-logo">⚡ FlowMind</span>
    <span id="titlebar-status">Loading...</span>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" data-view="dashboard"><span class="nav-icon">◈</span> Dashboard</div>
      <div class="nav-separator"></div>
      <div class="nav-section">Automation</div>
      <div class="nav-item" data-view="flows"><span class="nav-icon">⚡</span> Flows <span class="nav-badge" id="flows-badge">0</span></div>
      <div class="nav-item" data-view="runs"><span class="nav-icon">▶</span> Run History <span class="nav-badge" id="runs-badge">0</span></div>
      <div class="nav-footer">
        <div class="ai-pill"><div class="ai-dot" id="ai-dot"></div><span id="ai-label">Checking AI...</span></div>
      </div>
    </div>

    <div id="content">
      <!-- Dashboard -->
      <div class="view active" id="view-dashboard">
        <div class="view-title">Dashboard</div>
        <div class="stat-grid" id="stat-grid">
          <div class="stat-card"><div class="stat-num" id="s-flows">—</div><div class="stat-label">Flows</div></div>
          <div class="stat-card"><div class="stat-num" id="s-runs">—</div><div class="stat-label">Total Runs</div></div>
          <div class="stat-card"><div class="stat-num green" id="s-passed">—</div><div class="stat-label">Passed</div></div>
          <div class="stat-card"><div class="stat-num red" id="s-failed">—</div><div class="stat-label">Failed</div></div>
        </div>
        <div class="recent-title">Recent Runs</div>
        <div class="run-list-mini" id="recent-runs"></div>
      </div>

      <!-- Flows -->
      <div class="view" id="view-flows">
        <div class="toolbar">
          <span class="toolbar-title">Flows</span>
          <button class="btn" onclick="refreshFlows()">↺ Refresh</button>
        </div>
        <div id="flows-table-wrap"></div>
      </div>

      <!-- Runs -->
      <div class="view" id="view-runs" style="padding:0; overflow:hidden;">
        <div class="runs-layout">
          <div class="runs-sidebar" id="runs-list-pane">
            <div class="loading">Loading runs...</div>
          </div>
          <div class="runs-detail" id="runs-detail-pane">
            <div style="padding:40px; text-align:center; color:var(--text-dim)">
              <div style="font-size:32px;margin-bottom:12px">▶</div>
              Select a run to see details
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Live run output overlay -->
<div class="run-output-overlay" id="run-overlay" style="display:none">
  <div class="run-output-box">
    <div class="run-output-header">
      <span class="run-output-title" id="run-overlay-title">Running flow...</span>
      <span class="run-output-close" id="run-overlay-close">✕</span>
    </div>
    <div class="run-output-body" id="run-overlay-body"></div>
    <div class="run-output-footer">
      <button class="btn btn-primary" id="run-overlay-done" style="display:none" onclick="closeRunOverlay()">Done — View Report</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let state = { flows: [], runs: [], selectedRunId: null, selectedStepSs: null };

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadStatus(), loadFlows(), loadRuns()]);
  setupNav();
}

async function loadStatus() {
  const s = await window.flowmind.getStatus();
  document.getElementById('titlebar-status').textContent =
    `${s.flows} flows · ${s.runs} runs · ${s.passed} passed · ${s.failed} failed`;
  document.getElementById('s-flows').textContent = s.flows;
  document.getElementById('s-runs').textContent = s.runs;
  document.getElementById('s-passed').textContent = s.passed;
  document.getElementById('s-failed').textContent = s.failed;
  document.getElementById('flows-badge').textContent = s.flows;
  document.getElementById('runs-badge').textContent = s.runs;

  // AI status (best effort)
  const aiDot = document.getElementById('ai-dot');
  const aiLabel = document.getElementById('ai-label');
  try {
    const r = await fetch('http://localhost:11434/api/tags', { signal: AbortSignal.timeout(1500) });
    if (r.ok) {
      const data = await r.json();
      const model = data.models?.[0]?.name || 'ollama';
      aiDot.classList.add('online');
      aiLabel.textContent = `AI: ${model}`;
      return;
    }
  } catch {}
  if (typeof process !== 'undefined') {
    aiLabel.textContent = 'AI: Anthropic (cloud)';
    aiDot.classList.add('online');
  } else {
    aiLabel.textContent = 'AI: not connected';
  }
}

async function loadFlows() {
  state.flows = await window.flowmind.listFlows();
  renderFlows();
  renderRecentRuns();
}

async function loadRuns() {
  state.runs = await window.flowmind.listRuns();
  renderRunsList();
  renderRecentRuns();
}

async function refreshFlows() {
  state.flows = await window.flowmind.listFlows();
  renderFlows();
  document.getElementById('flows-badge').textContent = state.flows.length;
}

// ── Nav ───────────────────────────────────────────────────────────────────
function setupNav() {
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('view-' + el.dataset.view).classList.add('active');
    });
  });
}

function showView(name) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector(`.nav-item[data-view="${name}"]`).classList.add('active');
  document.getElementById('view-' + name).classList.add('active');
}

// ── Flows ─────────────────────────────────────────────────────────────────
function renderFlows() {
  const wrap = document.getElementById('flows-table-wrap');
  if (state.flows.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-msg">No flows yet</div>
      <div class="empty-sub">Record one with <span class="cmd">node flowmind.js learn &lt;url&gt;</span></div>
    </div>`;
    return;
  }
  wrap.innerHTML = `<table>
    <thead><tr><th>Name</th><th>Creator</th><th>URL</th><th>Updated</th><th></th></tr></thead>
    <tbody>${state.flows.map(f => `
      <tr>
        <td><div class="flow-name">${esc(f.name)}</div>${f.description ? `<div class="flow-url">${esc(f.description)}</div>` : ''}</td>
        <td><span title="${f.createdBy === 'agent' ? 'AI-generated' : 'Human-recorded'}" style="font-size:16px">${f.createdBy === 'agent' ? '🤖' : '👤'}</span></td>
        <td><div class="flow-url">${f.appUrl ? `<a href="#" onclick="window.flowmind.openFile('${esc(f.appUrl)}')" style="color:var(--accent)">${esc(f.appUrl)}</a>` : '—'}</div></td>
        <td><div class="flow-date">${fmtDate(f.updatedAt)}</div></td>
        <td><div class="actions">
          <button class="btn btn-primary" onclick="runFlowById('${f.id}', '${esc(f.name)}')">▶ Run</button>
          <button class="btn btn-danger" onclick="deleteFlow('${f.id}', '${esc(f.name)}')">✕ Delete</button>
        </div></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

async function deleteFlow(id, name) {
  if (!confirm(`Delete flow "${name}"? This will also delete all its run history.`)) return;
  const r = await window.flowmind.deleteFlow(id);
  if (r.ok) {
    state.flows = state.flows.filter(f => f.id !== id);
    state.runs = state.runs.filter(r => r.flowId !== id);
    renderFlows();
    renderRunsList();
    document.getElementById('flows-badge').textContent = state.flows.length;
    document.getElementById('runs-badge').textContent = state.runs.length;
  }
}

// ── Recent runs on dashboard ───────────────────────────────────────────────
function renderRecentRuns() {
  const el = document.getElementById('recent-runs');
  const recent = state.runs.slice(0, 8);
  if (recent.length === 0) {
    el.innerHTML = `<div style="color:var(--text-dim);font-size:13px">No runs yet.</div>`;
    return;
  }
  el.innerHTML = recent.map(r => {
    const flow = state.flows.find(f => f.id === r.flowId);
    const dur = r.duration ? (r.duration >= 1000 ? (r.duration/1000).toFixed(1)+'s' : r.duration+'ms') : '';
    return `
    <div class="run-mini" style="cursor:default">
      <div class="run-status-dot" style="background:${r.status==='passed'?'var(--green)':r.status==='failed'?'var(--red)':'var(--yellow)'}"></div>
      <div class="run-mini-name" style="cursor:pointer" onclick="openRunDetail('${r.id}')">${esc(r.flowName)}</div>
      <div class="run-mini-dur">${dur}</div>
      <div class="run-mini-time">${fmtRelative(r.startedAt)}</div>
      ${flow ? `<button class="btn" style="padding:2px 8px;font-size:11px;margin-left:4px" onclick="runFlowById('${flow.id}','${esc(r.flowName)}')">▶</button>` : ''}
    </div>`;
  }).join('');
}

function openRunDetail(runId) {
  showView('runs');
  selectRun(runId);
}

// ── Runs ──────────────────────────────────────────────────────────────────
function renderRunsList() {
  const pane = document.getElementById('runs-list-pane');
  if (state.runs.length === 0) {
    pane.innerHTML = `<div class="loading">No runs yet.</div>`;
    return;
  }
  pane.innerHTML = state.runs.map(r => `
    <div class="run-item ${r.id === state.selectedRunId ? 'selected' : ''}" onclick="selectRun('${r.id}')">
      <div class="run-item-header">
        <span class="badge ${r.status==='passed'?'badge-pass':r.status==='failed'?'badge-fail':'badge-run'}">${r.status}</span>
        <span class="run-name">${esc(r.flowName)}</span>
      </div>
      <div class="run-meta">
        <span class="run-id">${r.id.slice(0,8)}</span>
        ${r.duration ? `<span>${r.duration}ms</span>` : ''}
        <span>${fmtRelative(r.startedAt)}</span>
      </div>
    </div>`).join('');
}

async function selectRun(runId) {
  state.selectedRunId = runId;
  renderRunsList();

  const run = state.runs.find(r => r.id === runId);
  const steps = await window.flowmind.getSteps(runId);
  const detail = document.getElementById('runs-detail-pane');

  const parseFailureReport = (summary) => {
    if (!summary) return null;
    const sections = { what: '', why: '', how: '' };
    let current = null;
    for (const line of summary.split('\n')) {
      const t = line.trim();
      if (t === 'WHAT FAILED') { current = 'what'; continue; }
      if (t === 'WHY IT FAILED') { current = 'why'; continue; }
      if (t === 'HOW TO FIX IT') { current = 'how'; continue; }
      if (current && t) sections[current] += (sections[current] ? '\n' : '') + t;
    }
    return (sections.what || sections.why || sections.how) ? sections : null;
  };

  const failureReport = run.status === 'failed' ? parseFailureReport(run.summary) : null;

  const flow = state.flows.find(f => f.id === run.flowId);
  detail.innerHTML = `
    <div class="detail-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
      <div>
        <div class="detail-flow-name">${esc(run.flowName)}</div>
        <div class="detail-meta">
          <span class="badge ${run.status==='passed'?'badge-pass':run.status==='failed'?'badge-fail':'badge-run'}">${run.status}</span>
          ${run.duration ? `<span>${run.duration >= 1000 ? (run.duration/1000).toFixed(1)+'s' : run.duration+'ms'}</span>` : ''}
          <span style="font-family:monospace">${run.id.slice(0,8)}</span>
          <span>${fmtRelative(run.startedAt)}</span>
        </div>
      </div>
      ${flow ? `<button class="btn btn-primary" style="flex-shrink:0;margin-top:2px" onclick="runFlowById('${flow.id}', '${esc(run.flowName)}')">▶ Re-run</button>` : ''}
    </div>
    ${failureReport ? `
    <div class="failure-report">
      <div class="failure-report-title">⚠ FAILURE REPORT</div>
      ${failureReport.what ? `<div class="failure-section"><div class="failure-section-label">What Failed</div><div class="failure-section-body">${esc(failureReport.what)}</div></div>` : ''}
      ${failureReport.why ? `<div class="failure-section"><div class="failure-section-label">Why It Failed</div><div class="failure-section-body">${esc(failureReport.why)}</div></div>` : ''}
      ${failureReport.how ? `<div class="failure-section"><div class="failure-section-label">How To Fix</div><div class="failure-section-body">${esc(failureReport.how)}</div></div>` : ''}
    </div>` : ''}
    <div class="steps-list" id="steps-list">
      ${steps.map(s => `
        <div class="step-row ${s.screenshotPath ? 'has-screenshot' : ''}" onclick="viewStepScreenshot('${esc(s.screenshotPath || '')}', this)">
          <span class="step-num">${s.stepNumber}</span>
          <span class="step-icon">${s.status==='passed'?'✓':s.status==='failed'?'✗':'○'}</span>
          <span class="step-name" style="color:${s.status==='passed'?'var(--text)':s.status==='failed'?'var(--red)':'var(--text-dim)'}">${esc(s.name)}</span>
          <span class="step-dur">${s.duration ? s.duration+'ms' : ''}</span>
        </div>
        ${s.status==='failed' && s.errorMessage ? `<div class="step-err">${esc(s.errorMessage.slice(0,100))}</div>` : ''}`
      ).join('')}
    </div>
    <div class="screenshot-pane" id="screenshot-pane">
      <div class="screenshot-empty">Click a step to view its screenshot</div>
    </div>`;
}

async function viewStepScreenshot(ssPath, rowEl) {
  document.querySelectorAll('.step-row').forEach(r => r.classList.remove('selected-step'));
  if (!ssPath) return;
  rowEl.classList.add('selected-step');
  const pane = document.getElementById('screenshot-pane');
  pane.innerHTML = `<div class="screenshot-empty">Loading...</div>`;
  const data = await window.flowmind.getScreenshot(ssPath);
  if (data) {
    pane.innerHTML = `<img src="${data}" alt="step screenshot">`;
  } else {
    pane.innerHTML = `<div class="screenshot-empty">Screenshot not found</div>`;
  }
}

// ── Run flow ──────────────────────────────────────────────────────────────
let runCleanup = null;

function runFlowById(flowId, flowName) {
  const overlay = document.getElementById('run-overlay');
  const body = document.getElementById('run-overlay-body');
  const title = document.getElementById('run-overlay-title');
  const doneBtn = document.getElementById('run-overlay-done');

  title.textContent = `Running: ${flowName}`;
  body.textContent = '';
  doneBtn.style.display = 'none';
  overlay.style.display = 'flex';

  if (runCleanup) runCleanup();
  runCleanup = window.flowmind.onRunProgress(data => {
    if (data.type === 'stdout' || data.type === 'stderr') {
      body.textContent += data.text;
      body.scrollTop = body.scrollHeight;
    }
    if (data.type === 'done') {
      doneBtn.style.display = 'inline-flex';
      title.textContent = `Run complete: ${flowName}`;
      loadRuns(); // refresh run list in background
    }
  });

  window.flowmind.runFlow(flowId);
}

async function closeRunOverlay() {
  document.getElementById('run-overlay').style.display = 'none';
  if (runCleanup) { runCleanup(); runCleanup = null; }
  await loadRuns();
  showView('runs');
}

document.getElementById('run-overlay-close').addEventListener('click', () => {
  document.getElementById('run-overlay').style.display = 'none';
  if (runCleanup) { runCleanup(); runCleanup = null; }
});

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function fmtRelative(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}

// ── Boot ──────────────────────────────────────────────────────────────────
init();
</script>
